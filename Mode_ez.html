      extend: {

          pink: '#FFD6E8', pinkDeep: '#FF9FC3',
          yellow: '#FFF3B0', yellowDeep: '#FFD34D',
          bamboo: '#E9F7D8', ink: '#3A3355', plum: '#5C4B8A',

          card: '0 8px 0 0 rgba(58,51,85,0.06), 0 10px 25px -5px rgba(58,51,85,0.12)',

<style>
  * { box-sizing: border-box; }
  body { 
    font-family:'Mali',sans-serif; 
    background-color:#FBFBF6; 
    color:#3A3355;
    margin: 0;
    padding: 0;
    overflow-x: hidden;
  }
  
  #game-container::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(135deg, #FFE5F0 0%, #B8F2D4 25%, #BEE7F5 50%, #FFF3B0 75%, #E9F7D8 100%);
    background-size: 400% 400%;
    animation: gradientShift 15s ease infinite;
    z-index: -2;
    pointer-events: none;
  }

  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* Particle Background */
  .particle-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    pointer-events: none;
    overflow: hidden;
  }

  .particle {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    opacity: 0.3;
  }

  @keyframes float-particle {
    0% {
      transform: translateY(100vh) translateX(0);
      opacity: 0;
    }
    10% {
      opacity: 0.5;
    }
    90% {
      opacity: 0.5;
    }
    100% {
      transform: translateY(-100vh) translateX(100px);
      opacity: 0;
    }
  }

  .particle.active {
    animation: float-particle linear infinite;
  }

  .font-display { font-family:'Fredoka','Mali',sans-serif; }
  .font-hanzi { font-family:"'Noto Sans SC'",sans-serif; }

  /* === HEART BEAT EFFECT === */
  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    25% { transform: scale(1.2); }
    50% { transform: scale(1.1); }
  }

  .heartbeat-active { animation: heartbeat 0.6s ease-in-out; }

  /* === BUBBLE ANIMATION === */
  @keyframes bubble-float {
    0% {
      transform: translateY(0) translateX(0);
      opacity: 1;
    }
    100% {
      transform: translateY(-30px) translateX(8px);
      opacity: 0;
    }
  }

  .bubble {
    position: absolute;
    width: 6px;
    height: 6px;
    background: rgba(255, 255, 255, 0.6);
    border-radius: 50%;
    animation: bubble-float 1.2s ease-out forwards;
  }

  /* === HP BAR GLOW === */
  .hp-bar-container {
    position: relative;
    border: 4px solid rgba(58, 51, 85, 0.3);
  }

  .hp-bar-container.damaged {
    animation: hp-pulse 0.4s ease;
  }

  @keyframes hp-pulse {
    0%, 100% { box-shadow: inset 0 0 0 rgba(255, 159, 195, 0.5); }
    50% { box-shadow: inset 0 0 15px rgba(255, 159, 195, 0.8); }
  }

  #player-hp-bar {
    background: linear-gradient(90deg, #6FE3A8, #4FD89A);
    box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.5);
    transition: width 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  #boss-hp-bar {
    background: linear-gradient(90deg, #FF9FC3, #FF7BA6);
    box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.4);
    transition: width 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  /* === COMBO POPUP === */
  .combo-popup {
    position: fixed;
    bottom: 30%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    pointer-events: none;
  }

  .combo-card {
    background: linear-gradient(135deg, #FF9FC3 0%, #FF7BA6 100%);
    color: white;
    box-shadow: 0 8px 20px rgba(255, 159, 195, 0.6);
    font-weight: 700;
    letter-spacing: 2px;
  }

  @keyframes combo-pop {
    0% {
      transform: scale(0.2) translateY(20px);
      opacity: 0;
    }
    50% {
      transform: scale(1.15);
    }
    100% {
      transform: scale(1) translateY(0);
      opacity: 1;
    }
  }

  @keyframes combo-float-up {
    0% {
      opacity: 1;
      transform: translateY(0);
    }
    100% {
      opacity: 0;
      transform: translateY(-60px);
    }
  }

  .combo-card.show {
    animation: combo-pop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }

  .combo-card.float-away {
    animation: combo-float-up 0.8s ease-out forwards;
  }

  /* === SHAKE EFFECT === */
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-14px) rotate(-1deg); }
    40% { transform: translateX(12px) rotate(1deg); }
    60% { transform: translateX(-8px); }
    80% { transform: translateX(8px); }
  }
  .shake { animation: shake 0.4s ease; }

  /* === HIT EFFECT === */
  @keyframes hit {
    0% { transform: scale(1); filter: brightness(1); }
    30% { transform: scale(0.92); filter: brightness(1.6) saturate(2); }
    100% { transform: scale(1); filter: brightness(1); }
  }
  .hit { animation: hit 0.35s ease; }

  /* === FLOAT ANIMATION === */
  @keyframes floaty { 
    0%,100%{transform:translateY(0);} 
    50%{transform:translateY(-8px);} 
  }
  .float-slow { animation: floaty 3.5s ease-in-out infinite; }

  /* === BUTTON STYLES === */
  .choice-btn { 
    transition: transform .12s ease, box-shadow .12s ease, filter .12s ease;
    position: relative;
    background: linear-gradient(135deg, #FFFFFF 0%, #F5F5F5 100%);
    border: 3px solid rgba(58, 51, 85, 0.15);
  }
  
  .choice-btn:hover:not(:disabled) { 
    transform: translateY(-4px) scale(1.02);
    box-shadow: 0 8px 20px rgba(58, 51, 85, 0.15);
    filter: brightness(1.05);
  }
  
  .choice-btn:active:not(:disabled) { transform: translateY(2px); }
  .choice-btn:disabled { opacity: .5; cursor: not-allowed; }

  .choice-correct { 
    background: linear-gradient(135deg, #6FE3A8 0%, #4FD89A 100%) !important;
    color: white !important;
    border-color: transparent !important;
    box-shadow: 0 6px 20px rgba(111, 227, 168, 0.5) !important;
  }
  
  .choice-wrong { 
    background: linear-gradient(135deg, #FF9FC3 0%, #FF7BA6 100%) !important;
    color: white !important;
    border-color: transparent !important;
    box-shadow: 0 6px 20px rgba(255, 159, 195, 0.5) !important;
  }

  /* === ICON BUTTONS === */
  .icon-btn { 
    transition: transform .12s ease, box-shadow .12s ease;
    background: linear-gradient(135deg, #FFFFFF 0%, #F8F8F8 100%) !important;
    border: 2px solid rgba(58, 51, 85, 0.1) !important;
  }
  
  .icon-btn:hover:not(:disabled) { 
    transform: translateY(-3px) scale(1.08);
    box-shadow: 0 6px 15px rgba(58, 51, 85, 0.15);
  }
  
  .icon-btn:active:not(:disabled) { transform: translateY(1px) scale(.97); }
  .icon-btn:disabled { opacity:.35; cursor:not-allowed; transform:none !important; }

  /* === TIMER BAR === */
  #timer-bar { 
    transition: width 0.1s linear, background-color .3s;
    background: linear-gradient(90deg, #FFD34D, #FFC94D);
    box-shadow: 0 0 10px rgba(255, 211, 77, 0.4);
  }

  /* === STATUS CHIPS === */
  .status-chip {
    backdrop-filter: blur(10px);
    background: rgba(255, 255, 255, 0.85) !important;
    border: 2px solid rgba(255, 255, 255, 0.5) !important;
    box-shadow: 0 4px 15px rgba(58, 51, 85, 0.1);
  }

  /* === SPEECH BUBBLE === */
  .speech-bubble { 
    position: relative;
    background: linear-gradient(135deg, #FFFFFF 0%, #F8FFFE 100%);
    border: 3px solid rgba(111, 227, 168, 0.3);
    backdrop-filter: blur(5px);
  }
  
  .speech-bubble::before {
    content: '';
    position: absolute;
    top: -16px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 16px solid transparent;
    border-right: 16px solid transparent;
    border-bottom: 18px solid #FFFFFF;
    filter: drop-shadow(0 -2px 2px rgba(58, 51, 85, 0.1));
  }

  /* === HEART ICON WITH PULSE === */
  .heart-icon {
    position: relative;
  }

  .heart-pulse {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255, 159, 195, 0.6), transparent);
    animation: heart-pulse-anim 1.5s ease-out infinite;
  }

  @keyframes heart-pulse-anim {
    0% {
      transform: scale(1);
      opacity: 1;
    }
    100% {
      transform: scale(2);
      opacity: 0;
    }
  }

  /* === CARD STYLES === */
  .card-glass {
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.9) 0%, rgba(248, 248, 248, 0.7) 100%);
    backdrop-filter: blur(10px);
    border: 2px solid rgba(255, 255, 255, 0.6);
    box-shadow: 0 8px 32px rgba(58, 51, 85, 0.08);
  }

  /* === DAMAGE NUMBER === */
  .damage-number {
    position: fixed;
    font-weight: 700;
    font-size: 24px;
    pointer-events: none;
    z-index: 999;
  }

  @keyframes float-damage {
    0% {
      transform: translateY(0) scale(1);
      opacity: 1;
    }
    100% {
      transform: translateY(-50px) scale(0.5);
      opacity: 0;
    }
  }

  .damage-number.show {
    animation: float-damage 1s ease-out forwards;
  }
</style>
</head>
<body class="min-h-screen">

<div class="particle-container" id="particle-container"></div>

<div id="game-container" class="relative max-w-2xl mx-auto p-4 md:p-6 z-10">

  <div id="combo-popup" class="combo-popup">

  <!-- STATUS ROW -->

      { hanzi: "一月",   pinyin: "yī yuè",    meaning: "เดือนมกราคม",           questionImage: "public/Calender/January" },
      { hanzi: "二月",   pinyin: "èr yuè",    meaning: "เดือนกุมภาพันธ์",       questionImage: "public/Calender/February" },
      { hanzi: "星期几", pinyin: "xīngqī jǐ", meaning: "วันอะไร (ของสัปดาห์)", questionImage: "public/Calender/WhichDay" },
      { hanzi: "下午",   pinyin: "xiàwǔ",     meaning: "ตอนบ่าย",               questionImage: "public/Time/Afternoon" },
      { hanzi: "晚上",   pinyin: "wǎnshang",  meaning: "ตอนกลางคืน/ตอนเย็น",   questionImage: "public/Time/Evening" },
      { hanzi: "早上",   pinyin: "zǎoshang",  meaning: "ตอนเช้า",               questionImage: "public/Time/Morning" },
      { hanzi: "现在",   pinyin: "xiànzài",   meaning: "ตอนนี้",                 questionImage: "public/Time/Now" },
      { hanzi: "时间",   pinyin: "shíjiān",   meaning: "เวลา",                   questionImage: "public/Time/Time" },
      { hanzi: "分钟",   pinyin: "fēnzhōng",  meaning: "นาที",                   questionImage: "public/Time/Minutes" },
      { hanzi: "小时",   pinyin: "xiǎoshí",   meaning: "ชั่วโมง",                 questionImage: "public/Time/Hour" },
    ]
  },
  // ... เพิ่มบอสอื่นตามต้องการ
];

const TOTAL_BOSSES = 1;
const WRONG_DAMAGE = 20;
const HEAL_AMOUNT = 30;

let state = {
  bossIndex: 0,
  questionIndex: 0,
  bossHP: 100,
  playerHP: 100,
  score: 0,
  scoreMultiplier: 1,
  comboCount: 0,
  items: { heal: 1, fifty: 1, skip: 1 },
  currentQuestions: [],
  answered: false,
  paused: false,
  gameOver: false,
  victory: false,
  bossesDefeated: 0,
  timer: null,
  damagePerHit: 25,
};

const el = {
  gameContainer: document.getElementById('game-container'),
  bossName: document.getElementById('boss-name'),
  bossHPBar: document.getElementById('boss-hp-bar'),
  bossHPText: document.getElementById('boss-hp-text'),
  playerHPBar: document.getElementById('player-hp-bar'),
  playerHPText: document.getElementById('player-hp-text'),
  scoreValue: document.getElementById('score-value'),
  comboBadge: document.getElementById('combo-badge'),
  questionHanzi: document.getElementById('question-hanzi'),
  questionPinyin: document.getElementById('question-pinyin'),
  playSoundBtn: document.getElementById('play-sound-btn'),
  choicesGrid: document.getElementById('choices-grid'),
  timerBar: document.getElementById('timer-bar'),
  bossProgress: document.getElementById('boss-progress'),
  comboPopup: document.getElementById('combo-popup'),
  comboPopupText: document.getElementById('combo-popup-text'),
  bubbleContainer: document.getElementById('bubble-container'),
};

// Utility
function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }
function speak(text) {
  if ('speechSynthesis' in window) {
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'zh-CN';
    speechSynthesis.cancel();
    speechSynthesis.speak(utterance);
  }
}

function getComboMultiplier() {
  if (state.comboCount >= 10) return 5;
  if (state.comboCount >= 5) return 3;
  if (state.comboCount >= 3) return 2;
  return 1;
}

function resetCombo() {
  state.comboCount = 0;
  state.scoreMultiplier = 1;
}

/* =========================================================
   PARTICLE SYSTEM
========================================================= */
function initParticles() {
  const container = document.getElementById('particle-container');
  const colors = ['#FFD6E8', '#B8F2D4', '#BEE7F5', '#FFF3B0'];
  
  for (let i = 0; i < 15; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.left = Math.random() * 100 + '%';
    particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    particle.style.animationDuration = (5 + Math.random() * 10) + 's';
    particle.style.animationDelay = Math.random() * 5 + 's';
    particle.classList.add('active');
    container.appendChild(particle);
  }
}

/* =========================================================
   BUBBLE EFFECT IN HP BAR
========================================================= */
function createBubble() {
  if (state.answered) return;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.style.left = Math.random() * 100 + '%';
  bubble.style.top = Math.random() * 100 + '%';
  el.bubbleContainer.appendChild(bubble);
  
  setTimeout(() => bubble.remove(), 1200);
}

setInterval(createBubble, 300);

/* =========================================================
   HP & DAMAGE DISPLAY
========================================================= */
function updatePlayerHP() {
  const percent = Math.max(0, (state.playerHP / 100) * 100);
  el.playerHPBar.style.width = percent + '%';
  el.playerHPText.textContent = `${state.playerHP}/100`;
  
  // Add damage animation
  el.playerHPBar.parentElement.classList.add('damaged');
  setTimeout(() => el.playerHPBar.parentElement.classList.remove('damaged'), 400);
}

function updateBossHP() {
  const percent = Math.max(0, (state.bossHP / 100) * 100);
  el.bossHPBar.style.width = percent + '%';
  el.bossHPText.textContent = `${state.bossHP}/100`;
  
  el.bossHPBar.parentElement.classList.add('damaged');
  setTimeout(() => el.bossHPBar.parentElement.classList.remove('damaged'), 400);
  
  // Heart beat effect
  const heart = document.querySelector('.heart-pulse');
  if (heart) {
    heart.style.animation = 'none';
    setTimeout(() => heart.style.animation = 'heart-pulse-anim 1.5s ease-out infinite', 10);
  }
}

function updateScoreUI() {
  el.scoreValue.textContent = state.score;
  el.comboBadge.textContent = `x${state.scoreMultiplier}`;
  
  // Combo badge color change
  if (state.comboCount >= 10) {
    el.comboBadge.style.background = 'linear-gradient(135deg, #FFD34D, #FFC94D)';
  } else if (state.comboCount >= 5) {
    el.comboBadge.style.background = 'linear-gradient(135deg, #FF9FC3, #FF7BA6)';
  } else {
    el.comboBadge.style.background = 'linear-gradient(135deg, #6FCBE8, #5CB8DD)';
  }
}

function updateItemUI() {
  for (const [type, count] of Object.entries(state.items)) {
    const el_count = document.getElementById(`item-${type}-count`);
    if (el_count) el_count.textContent = count;
  }
}

function showComboPopup(title, subtitle) {
  const popupText = el.comboPopupText;
  popupText.textContent = title;
  popupText.classList.add('show');
  popupText.classList.remove('hidden');
  
  setTimeout(() => {
    popupText.classList.add('float-away');
    setTimeout(() => {
      popupText.classList.remove('show', 'float-away');
      popupText.classList.add('hidden');
    }, 800);
  }, 1000);
}

/* =========================================================
   BOSS & QUESTION LOADING
========================================================= */
function loadBoss(index) {
  const boss = bossData[index];
  state.bossIndex = index;
  state.bossHP = boss.hp;
  state.playerHP = 100;
  state.questionIndex = 0;
  state.bossesDefeated = index;
  state.comboCount = 0;
  
  el.bossName.textContent = boss.name;
  el.bossProgress.textContent = (index + 1);
  el.gameContainer.style.borderColor = boss.color;
  
  const count = Math.floor(Math.random() * 3) + 3;
  state.currentQuestions = shuffle(boss.questions).slice(0, count);
  state.damagePerHit = Math.ceil(boss.hp / count);
  
  updatePlayerHP();
  updateBossHP();
  updateItemUI();
  updateScoreUI();
  loadQuestion();
}

function loadQuestion() {
  state.answered = false;
  el.choicesGrid.innerHTML = '';
  const q = state.currentQuestions[state.questionIndex];
  
  el.questionHanzi.textContent = q.hanzi;
  el.questionPinyin.textContent = q.pinyin;
  
  // Create choice buttons
  const meanings = shuffle([q.meaning, ...generateFakeAnswers(q.meaning)]);
  meanings.forEach(meaning => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn rounded-xl px-4 py-3 md:py-4 font-display text-sm md:text-base font-600 shadow-card';
    btn.textContent = meaning;
    btn.addEventListener('click', () => handleChoice(btn, q.meaning));
    el.choicesGrid.appendChild(btn);
  });
  
  startTimer();
}

function generateFakeAnswers(correct) {
  const fakes = [
    'ตัวเลือกที่ 2',
    'ตัวเลือกที่ 3',
    'ตัวเลือกที่ 4',
  ];
  return shuffle(fakes).slice(0, 3);
}

function startTimer() {
  let time = 15;
  el.timerBar.style.width = '100%';
  el.timerBar.style.backgroundColor = '#FFD34D';
  
  clearInterval(state.timer);
  state.timer = setInterval(() => {
    time--;
    const percent = (time / 15) * 100;
    el.timerBar.style.width = percent + '%';
    
    if (time <= 5) {
      el.timerBar.style.backgroundColor = '#FF9FC3';
    }
    
    if (time <= 0) {
      clearInterval(state.timer);
      state.answered = true;
      state.playerHP -= WRONG_DAMAGE;
      resetCombo();
      updatePlayerHP();
      checkOutcomeThenNext();
    }
  }, 1000);
}

function hitBoss() {
  const img = document.getElementById('boss-image');
  img.classList.add('hit');
  setTimeout(() => img.classList.remove('hit'), 350);
}

function shakeScreen() {
  el.gameContainer.classList.add('shake');
  setTimeout(() => el.gameContainer.classList.remove('shake'), 400);
}

function disableChoices() {
  document.querySelectorAll('.choice-btn').forEach(btn => btn.disabled = true);
}

function stopHeartbeat() {
  // Clear heartbeat animation if needed
}

/* =========================================================
   CHOICE HANDLING
========================================================= */
function handleChoice(btn, correctMeaning) {
  if (state.answered) return;
  state.answered = true;
  clearInterval(state.timer);
  disableChoices();
  
  const isCorrect = btn.textContent === correctMeaning;
  
  if (isCorrect) {
    btn.classList.add('choice-correct');
    state.bossHP -= state.damagePerHit;
    state.comboCount += 1;
    state.scoreMultiplier = getComboMultiplier();
    state.score += 100 * state.scoreMultiplier;
    updateScoreUI();
    if (state.comboCount === 3 || state.comboCount === 5 || state.comboCount === 10) {
      showComboPopup(`🎯 COMBO ${state.comboCount}!`, `คะแนนคูณ x${state.scoreMultiplier}`);
    }
    updateBossHP();
    hitBoss();
  } else {
    btn.classList.add('choice-wrong');
    document.querySelectorAll('.choice-btn').forEach(b => {
      if (b.textContent === correctMeaning) b.classList.add('choice-correct');
    });
    state.playerHP -= WRONG_DAMAGE;
    resetCombo();
    updatePlayerHP();
    shakeScreen();
  }
  
  updateItemUI();
  checkOutcomeThenNext();
}

function checkOutcomeThenNext() {
  setTimeout(() => {
    if (state.playerHP <= 0) return gameOver();
    if (state.bossHP <= 0) return bossDefeated();
    
    state.questionIndex++;
    if (state.questionIndex >= state.currentQuestions.length) {
      const boss = bossData[state.bossIndex];
      const count = Math.floor(Math.random() * 3) + 3;
      state.currentQuestions = shuffle(boss.questions).slice(0, count);
      state.questionIndex = 0;
      state.damagePerHit = Math.ceil(state.bossHP / count);
    }
    loadQuestion();
  }, 900);
}

function bossDefeated() {
  stopHeartbeat();
  state.bossesDefeated++;
  state.score += (state.playerHP * 10);
  Swal.fire({
    title: '⚔️ ปราบบอสสำเร็จ!',
    text: 'ไปลุยบอสตัวต่อไปกันเลย!',
    confirmButtonText: 'ไปต่อ',
    confirmButtonColor: '#6FE3A8',
    background: '#FEFCF3',
    color: '#3A3355',
  }).then(() => {
    const next = state.bossIndex + 1;
    if (next >= TOTAL_BOSSES) {
      victory();
    } else {
      loadBoss(next);
    }
  });
}

function gameOver() {
  clearInterval(state.timer);
  stopHeartbeat();
  Swal.fire({
    title: '💔 พ่ายแพ้!',
    html: `<p>พลังชีวิตหมดแล้ว</p>
           <p style="font-size: 18px; margin-top: 10px;">ปราบบอสได้: <strong>${state.bossesDefeated}</strong>/10</p>
           <p style="font-size: 16px; margin-top: 5px;">คะแนน: <strong>${state.score}</strong></p>`,
    confirmButtonText: 'เริ่มใหม่',
    denyButtonText: 'กลับหน้าแรก',
    confirmButtonColor: '#FF9FC3',
    denyButtonColor: '#6FCBE8',
    background: '#FEFCF3',
    color: '#3A3355',
  }).then((result) => {
    if (result.isConfirmed) {
      location.reload();
    }
  });
}

function victory() {
  stopHeartbeat();
  state.score += (state.playerHP * 10);
  Swal.fire({
    title: '🏆 ชนะครบ 10 บอส!',
    html: `<p>สุดยอดไปเลย! คุณคือแชมป์คำศัพท์จีน</p>
           <div style="margin-top: 20px; padding: 15px; background: rgba(111, 227, 168, 0.2); border-radius: 10px;">
             <p style="font-size: 18px; margin: 5px 0;">🎯 ปราบบอสได้: <strong>${state.bossesDefeated}</strong>/10</p>
             <p style="font-size: 18px; margin: 5px 0;">⭐ คะแนนรวม: <strong>${state.score}</strong></p>
           </div>`,
    confirmButtonText: 'เล่นอีกครั้ง',
    denyButtonText: 'กลับหน้าแรก',
    confirmButtonColor: '#FFD34D',
    denyButtonColor: '#6FCBE8',
    background: '#FEFCF3',
    color: '#3A3355',
  }).then((result) => {
    if (result.isConfirmed) {
      location.reload();
    }
  });
}

function pauseGame() {
  if (state.gameOver || state.victory) return;
  state.paused = true;
  clearInterval(state.timer);
  disableChoices();
  
  Swal.fire({
    title: '⏸️ หยุดเล่น',
    html: '<p>เลือกสิ่งที่คุณต้องการ</p>',
    showDenyButton: true,
    confirmButtonText: 'ต่อเล่น',
    denyButtonText: 'กลับหน้าแรก',
    confirmButtonColor: '#6FE3A8',
    denyButtonColor: '#FF9FC3',
    background: '#FEFCF3',
    color: '#3A3355',
    allowOutsideClick: false,
    allowEscapeKey: false,
  }).then((result) => {
    if (result.isConfirmed) {
      state.paused = false;
      updateItemUI();
      startTimer();
    }
  });
}

/* =========================================================
   ITEMS & BUTTONS
========================================================= */
document.getElementById('stop-btn').addEventListener('click', pauseGame);

document.querySelectorAll('[data-item]').forEach(btn => {
  btn.addEventListener('click', () => {
    const type = btn.getAttribute('data-item');
    if (state.items[type] <= 0 || state.answered) return;
    
    if (type === 'heal') {
      state.items.heal--;
      state.playerHP = Math.min(state.playerHP + HEAL_AMOUNT, 100);
      updatePlayerHP();
      showComboPopup('💚 ฮีล!', `+${HEAL_AMOUNT} HP`);
    }
    
    if (type === 'fifty') {
      state.items.fifty--;
      const q = state.currentQuestions[state.questionIndex];
      const wrongButtons = [...document.querySelectorAll('.choice-btn')]
        .filter(b => b.textContent !== q.meaning);
      shuffle(wrongButtons).slice(0, 2).forEach(b => {
        b.disabled = true;
        b.style.visibility = 'hidden';
      });
    }
    
    if (type === 'skip') {
      state.items.skip--;
      state.answered = true;
      clearInterval(state.timer);
      disableChoices();
      checkOutcomeThenNext();
    }
    
    updateItemUI();
  });
});

el.playSoundBtn.addEventListener('click', () => {
  speak(el.questionHanzi.textContent);
});

/* =========================================================ข
   INITIALIZE
========================================================= */
initParticles();
updatePlayerHP();
updateBossHP();
updateItemUI();
updateScoreUI();
loadBoss(0);
</script>

</body>
</html>
