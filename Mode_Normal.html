<style>
  body { font-family:'Mali',sans-serif; background-color:#FBFBF6; color:#3A3355; }
  .font-display { font-family:'Fredoka','Mali',sans-serif; }
  .font-hanzi { font-family:"'Noto Sans SC'",sans-serif; }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-14px) rotate(-1deg); }
    40% { transform: translateX(12px) rotate(1deg); }
    60% { transform: translateX(-8px); }
    80% { transform: translateX(8px); }
  }
  .shake { animation: shake 0.4s ease; }

  @keyframes hit {
    0% { transform: scale(1); filter: brightness(1); }
    30% { transform: scale(0.92); filter: brightness(1.6) saturate(2); }
    100% { transform: scale(1); filter: brightness(1); }
  }
  .hit { animation: hit 0.35s ease; }

  @keyframes floaty { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }
  .float-slow { animation: floaty 3.5s ease-in-out infinite; }

  @keyframes popIn { 0%{ opacity:0; transform:translateY(6px) scale(.96); } 100%{ opacity:1; transform:translateY(0) scale(1); } }
  .pop-in { animation: popIn .25s ease; }

  .icon-btn { transition: transform .12s ease; }
  .icon-btn:hover:not(:disabled) { transform: translateY(-2px) scale(1.05); }
  .icon-btn:active:not(:disabled) { transform: translateY(1px) scale(.97); }
  .icon-btn:disabled { opacity:.35; cursor:not-allowed; transform:none !important; }

  #timer-bar { transition: width 0.1s linear, background-color .3s; }
  #boss-hp-bar, #player-hp-bar { transition: width .35s ease; }

  #answer-input { transition: box-shadow .15s ease, border-color .15s ease; }
  #answer-input.ring-correct { border-color:#6FE3A8 !important; box-shadow:0 0 0 4px rgba(111,227,168,.35); }
  #answer-input.ring-wrong { border-color:#FF9FC3 !important; box-shadow:0 0 0 4px rgba(255,159,195,.35); }
  #answer-input:disabled { opacity:.7; }

  /* Speech bubble pointing up toward the boss */
  .speech-bubble { position: relative; }
  .speech-bubble::before {
    content: '';
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 14px solid transparent;
    border-right: 14px solid transparent;
    border-bottom: 16px solid white;
  }
</style>
</head>
<body class="min-h-screen bg-gradient-to-b from-sky via-mint to-bamboo">

<div id="game-container" class="max-w-2xl mx-auto p-4 md:p-6">

  <!-- Status row -->

<script>
/* =========================================================
   BOSS & QUESTION DATA
   5 Bosses x 5 unique questions each = 25 total (HSK 1-2).
   questionImage is left as "" — plug in your own art later;
   the <img id="question-image"> tag stays hidden until a
   non-empty URL is provided.
========================================================= */

const bossData = [
  {
    id: 1,
    name: "จอมเวลา ปีศาจนาฬิกา",
    theme: "Time — ชั่วโมงและนาที",
    questions: [
      { hanzi: "八点",       pinyin: "bā diǎn",             meaning: "8:00 น.",  questionImage: "public/Clock/08_00.png" },
      { hanzi: "十点十五分", pinyin: "shí diǎn shíwǔ fēn",  meaning: "10:15 น.", questionImage: "public/Clock/10_15.png" },
      { hanzi: "三点半",     pinyin: "sān diǎn bàn",        meaning: "3:30 น.",  questionImage: "public/Clock/03_30.png" },
      { hanzi: "早上",       pinyin: "zǎoshang",            meaning: "ตอนเช้า", questionImage: "public/Clock/morning.png" },
      { hanzi: "晚上",       pinyin: "wǎnshang",            meaning: "ตอนเย็น", questionImage: "public/Clock/evening.png" },
    ]
  },
  {
    id: 2,
    name: "อสูรปฏิทิน",
    theme: "Calendar / Dates — วัน วันที่ สัปดาห์",
    questions: [
      { hanzi: "星期一", pinyin: "xīngqīyī", meaning: "วันจันทร์",   questionImage: "" },
      { hanzi: "三号",   pinyin: "sān hào",  meaning: "วันที่ 3",    questionImage: "" },
      { hanzi: "一月",   pinyin: "yī yuè",   meaning: "เดือนมกราคม", questionImage: "" },
      { hanzi: "昨天",   pinyin: "zuótiān",  meaning: "เมื่อวาน",    questionImage: "" },
      { hanzi: "明天",   pinyin: "míngtiān", meaning: "พรุ่งนี้",    questionImage: "" },
    ]
  },
  {
    id: 3,
    name: "ราชาสไลม์กิจวัตร",
    theme: "Daily Activities — กิจวัตรประจำวันและคำกริยา",
    questions: [
      { hanzi: "起床", pinyin: "qǐchuáng", meaning: "ตื่นนอน",     questionImage: "" },
      { hanzi: "睡觉", pinyin: "shuìjiào", meaning: "นอนหลับ",     questionImage: "" },
      { hanzi: "吃饭", pinyin: "chīfàn",   meaning: "กินข้าว",     questionImage: "" },
      { hanzi: "看书", pinyin: "kànshū",   meaning: "อ่านหนังสือ", questionImage: "" },
      { hanzi: "工作", pinyin: "gōngzuò",  meaning: "ทำงาน",       questionImage: "" },
    ]
  },
  {
    id: 4,
    name: "ก็อบลินเส้นทาง",
    theme: "Locations — สถานที่และทิศทาง",
    questions: [
      { hanzi: "医院", pinyin: "yīyuàn",    meaning: "โรงพยาบาล", questionImage: "" },
      { hanzi: "学校", pinyin: "xuéxiào",   meaning: "โรงเรียน",  questionImage: "" },
      { hanzi: "商店", pinyin: "shāngdiàn", meaning: "ร้านค้า",   questionImage: "" },
      { hanzi: "前面", pinyin: "qiánmiàn",  meaning: "ข้างหน้า",  questionImage: "" },
      { hanzi: "后面", pinyin: "hòumiàn",   meaning: "ข้างหลัง",  questionImage: "" },
    ]
  },
  {
    id: 5,
    name: "มังกรลมฟ้าอากาศ",
    theme: "Weather — อากาศและคำคุณศัพท์",
    questions: [
      { hanzi: "天气", pinyin: "tiānqì",    meaning: "อากาศ", questionImage: "" },
      { hanzi: "冷",   pinyin: "lěng",      meaning: "หนาว",   questionImage: "" },
      { hanzi: "热",   pinyin: "rè",        meaning: "ร้อน",   questionImage: "" },
      { hanzi: "漂亮", pinyin: "piàoliang", meaning: "สวย",   questionImage: "" },
      { hanzi: "高兴", pinyin: "gāoxìng",   meaning: "ดีใจ",   questionImage: "" },
    ]
  },
];

/* =========================================================
   GAME STATE
========================================================= */
const TOTAL_BOSSES = 5;
const QUESTIONS_PER_BOSS = 5;
const QUESTION_TIME = 18; // seconds (typing needs more time than tapping a choice)
const WRONG_DAMAGE = 15;
const HEAL_AMOUNT = 20;
const DAMAGE_PER_HIT = 100 / QUESTIONS_PER_BOSS; // fixed: exactly 5 questions defeat a boss

let state = {
  bossIndex: 0,
  playerHP: 100,
  bossHP: 100,
  currentQuestions: [],
  questionIndex: 0,
  timer: null,
  timeLeft: QUESTION_TIME,
  items: { heal: 1, hint: 1, skip: 1 },
  answered: false,
  hintUsedThisQuestion: false,
  paused: false,
};

/* =========================================================
   DOM refs
========================================================= */
const el = {
  container: document.getElementById('game-container'),
  bossProgress: document.getElementById('boss-progress'),
  bossName: document.getElementById('boss-name'),
  bossImage: document.getElementById('boss-image'),
  bossHpBar: document.getElementById('boss-hp-bar'),
  bossHpText: document.getElementById('boss-hp-text'),
  playerHpBar: document.getElementById('player-hp-bar'),
  playerHpText: document.getElementById('player-hp-text'),
  timerBar: document.getElementById('timer-bar'),
  questionImage: document.getElementById('question-image'),
  questionHanzi: document.getElementById('question-hanzi'),
  questionPinyin: document.getElementById('question-pinyin'),
  playSoundBtn: document.getElementById('play-sound-btn'),
  answerForm: document.getElementById('answer-form'),
  answerInput: document.getElementById('answer-input'),
  feedbackBox: document.getElementById('feedback-box'),
  itemHealCount: document.getElementById('item-heal-count'),
  itemHintCount: document.getElementById('item-hint-count'),
  itemSkipCount: document.getElementById('item-skip-count'),
};

/* =========================================================
   HELPERS
========================================================= */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function normalize(str) {
  return str.trim().replace(/\s+/g, ' ');
}

function speak(text) {
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'zh-CN';
  utter.rate = 0.85;
  speechSynthesis.speak(utter);
}

function updatePlayerHP() {
  const hp = Math.max(state.playerHP, 0);
  el.playerHpBar.style.width = hp + '%';
  el.playerHpText.textContent = `${hp}/100`;
}

function updateBossHP() {
  const hp = Math.max(state.bossHP, 0);
  el.bossHpBar.style.width = hp + '%';
  el.bossHpText.textContent = `${hp}/100`;
}

function updateItemUI() {
  el.itemHealCount.textContent = state.items.heal;
  el.itemHintCount.textContent = state.items.hint;
  el.itemSkipCount.textContent = state.items.skip;
  document.querySelectorAll('[data-item]').forEach(btn => {
    const type = btn.getAttribute('data-item');
    btn.disabled = state.items[type] <= 0 || state.answered;
  });
}

function shakeScreen() {
  el.container.classList.add('shake');
  setTimeout(() => el.container.classList.remove('shake'), 400);
}

function hitBoss() {
  el.bossImage.classList.add('hit');
  setTimeout(() => el.bossImage.classList.remove('hit'), 350);
}

function showFeedback(correct, correctAnswer) {
  if (correct) {
    el.feedbackBox.className = 'flex mt-4 rounded-2xl px-4 py-3 font-thai text-sm md:text-base items-center justify-center gap-2 pop-in bg-mint text-ink';
    el.feedbackBox.innerHTML = `<i class="fa-solid fa-circle-check text-mintDeep"></i> ถูกต้อง!`;
  } else {
    el.feedbackBox.className = 'flex mt-4 rounded-2xl px-4 py-3 font-thai text-sm md:text-base items-center justify-center gap-2 pop-in bg-pink text-ink';
    el.feedbackBox.innerHTML = `<i class="fa-solid fa-circle-xmark text-pinkDeep"></i> คำตอบที่ถูกคือ "${correctAnswer}"`;
  }
}

function hideFeedback() {
  el.feedbackBox.className = 'hidden';
  el.feedbackBox.innerHTML = '';
}

/* =========================================================
   GAME FLOW
========================================================= */
function loadBoss(index) {
  state.bossIndex = index;
  const boss = bossData[index];

  state.bossHP = 100;
  state.answered = false;

  // Play through all 5 assigned questions for this boss, in order — no random sampling.
  state.currentQuestions = boss.questions;
  state.questionIndex = 0;

  el.bossProgress.textContent = index + 1;
  el.bossName.textContent = boss.name;
  el.bossImage.src = `https://robohash.org/${boss.id}?set=set3`;
  el.bossImage.onerror = () => {
    el.bossImage.onerror = null;
    el.bossImage.src = `https://robohash.org/${boss.id}${Date.now()}?set=set3`;
  };
  updateBossHP();

  loadQuestion();
}

function loadQuestion() {
  state.answered = false;
  state.hintUsedThisQuestion = false;
  hideFeedback();

  const q = state.currentQuestions[state.questionIndex];

  el.questionHanzi.textContent = q.hanzi;
  el.questionPinyin.textContent = q.pinyin;

  if (q.questionImage) {
    el.questionImage.src = q.questionImage;
    el.questionImage.alt = q.meaning;
    el.questionImage.classList.remove('hidden');
  } else {
    el.questionImage.src = '';
    el.questionImage.classList.add('hidden');
  }

  el.answerInput.value = '';
  el.answerInput.disabled = false;
  el.answerInput.classList.remove('ring-correct', 'ring-wrong');
  el.answerInput.focus();

  updateItemUI();
  startTimer();
}

function startTimer() {
  clearInterval(state.timer);
  state.timeLeft = QUESTION_TIME;
  el.timerBar.style.width = '100%';
  el.timerBar.classList.remove('bg-pinkDeep');
  el.timerBar.classList.add('bg-yellowDeep');

  state.timer = setInterval(() => {
    if (state.paused) return;
    state.timeLeft -= 0.1;
    const pct = Math.max((state.timeLeft / QUESTION_TIME) * 100, 0);
    el.timerBar.style.width = pct + '%';
    if (pct < 25) {
      el.timerBar.classList.remove('bg-yellowDeep');
      el.timerBar.classList.add('bg-pinkDeep');
    }
    if (state.timeLeft <= 0) {
      clearInterval(state.timer);
      if (!state.answered) handleTimeout();
    }
  }, 100);
}

function handleTimeout() {
  const q = state.currentQuestions[state.questionIndex];
  state.answered = true;
  el.answerInput.disabled = true;
  el.answerInput.classList.add('ring-wrong');
  state.playerHP -= WRONG_DAMAGE;
  updatePlayerHP();
  shakeScreen();
  showFeedback(false, q.meaning);
  updateItemUI();
  checkOutcomeThenNext();
}

function submitAnswer(typed) {
  if (state.answered) return;
  const q = state.currentQuestions[state.questionIndex];
  state.answered = true;
  clearInterval(state.timer);
  el.answerInput.disabled = true;

  const isCorrect = normalize(typed) === normalize(q.meaning);

  if (isCorrect) {
    el.answerInput.classList.add('ring-correct');
    state.bossHP -= DAMAGE_PER_HIT;
    updateBossHP();
    hitBoss();
    showFeedback(true, q.meaning);
  } else {
    el.answerInput.classList.add('ring-wrong');
    state.playerHP -= WRONG_DAMAGE;
    updatePlayerHP();
    shakeScreen();
    showFeedback(false, q.meaning);
  }

  updateItemUI();
  checkOutcomeThenNext();
}

el.answerForm.addEventListener('submit', (e) => {
  e.preventDefault();
  if (state.answered) return;
  submitAnswer(el.answerInput.value);
});

function checkOutcomeThenNext() {
  setTimeout(() => {
    if (state.playerHP <= 0) return gameOver();
    if (state.bossHP <= 0) return bossDefeated();

    state.questionIndex++;
    if (state.questionIndex >= state.currentQuestions.length) {
      // All 5 assigned questions for this boss have been answered — boss quest complete.
      return bossDefeated();
    }
    loadQuestion();
  }, 1100);
}

function bossDefeated() {
  Swal.fire({
    title: '⚔️ ปราบบอสสำเร็จ!',
    text: 'ไปลุยบอสตัวต่อไปกันเลย!',
    confirmButtonText: 'ไปต่อ',
    confirmButtonColor: '#6FE3A8',
    background: '#FEFCF3',
    color: '#3A3355',
  }).then(() => {
    const next = state.bossIndex + 1;
    if (next >= TOTAL_BOSSES) {
      victory();
    } else {
      loadBoss(next);
    }
  });
}

function gameOver() {
  clearInterval(state.timer);
  Swal.fire({
    title: '💔 พ่ายแพ้!',
    text: 'พลังชีวิตหมดแล้ว',
    confirmButtonText: 'เริ่มใหม่',
    denyButtonText: 'กลับหน้าแรก',
    confirmButtonColor: '#FF9FC3',
    denyButtonColor: '#6FCBE8',
    background: '#FEFCF3',
    color: '#3A3355',
  }).then((result) => {
    if (result.isConfirmed) {
      location.reload();
    } else if (result.isDenied) {
      window.location.href = 'index.html';
    }
  });
}

function victory() {
  Swal.fire({
    title: '🏆 ชนะครบ 5 บอส!',
    text: 'สุดยอดไปเลย! คุณคือแชมป์คำศัพท์จีน (Medium Mode)',
    confirmButtonText: 'เล่นอีกครั้ง',
    denyButtonText: 'กลับหน้าแรก',
    confirmButtonColor: '#FFD34D',
    denyButtonColor: '#6FCBE8',
    background: '#FEFCF3',
    color: '#3A3355',
  }).then((result) => {
    if (result.isConfirmed) {
      location.reload();
    } else if (result.isDenied) {
      window.location.href = 'index.html';
    }
  });
}

/* =========================================================
   ITEMS
========================================================= */
document.querySelectorAll('[data-item]').forEach(btn => {
  btn.addEventListener('click', () => {
    const type = btn.getAttribute('data-item');
    if (state.items[type] <= 0 || state.answered) return;

    if (type === 'heal') {
      state.items.heal--;
      state.playerHP = Math.min(state.playerHP + HEAL_AMOUNT, 100);
      updatePlayerHP();
    }

    if (type === 'hint' && !state.hintUsedThisQuestion) {
      state.items.hint--;
      state.hintUsedThisQuestion = true;
      const q = state.currentQuestions[state.questionIndex];
      el.answerInput.value = q.meaning.charAt(0);
      el.answerInput.focus();
      // move cursor to the end
      const len = el.answerInput.value.length;
      el.answerInput.setSelectionRange(len, len);
    }

    if (type === 'skip') {
      state.items.skip--;
      state.answered = true;
      clearInterval(state.timer);
      el.answerInput.disabled = true;
      checkOutcomeThenNext();
    }

    updateItemUI();
  });
});


    // ===== PAUSE/STOP GAME FUNCTION =====
    function pauseGame() {
      state.paused = true;
      clearInterval(state.timer);
      
      Swal.fire({
        title: '⏸️ หยุดการเล่น',
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: 'ต่อเล่น',
        cancelButtonText: 'กลับหน้าแรก',
        confirmButtonColor: '#6FE3A8',
        cancelButtonColor: '#FF9FC3',
        reverseButtons: true
      }).then((result) => {
        if (result.isConfirmed) {
          // Continue playing
          state.paused = false;
          startTimer();
        } else if (result.dismiss === Swal.DismissReason.cancel) {
          // Go back to home
          window.location.href = 'index.html';
        } else {
          // If cancelled (X button), resume
          state.paused = false;
          startTimer();
        }
      });
    }

    // Event listener for stop button
    document.getElementById('stop-btn').addEventListener('click', pauseGame);


    /* =========================================================
   SOUND BUTTON
========================================================= */
el.playSoundBtn.addEventListener('click', () => {
  speak(el.questionHanzi.textContent);
});

/* =========================================================
   INIT
========================================================= */
updatePlayerHP();
updateItemUI();
loadBoss(0);
</script>
